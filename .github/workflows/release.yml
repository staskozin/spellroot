name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected an exact stable SemVer tag, got: ${tag}" >&2
            exit 1
          fi

          version="${tag#v}"
          stored_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ "${stored_version}" != "${version}" ]]; then
            echo "Tag ${tag} does not match mod_version=${stored_version}" >&2
            exit 1
          fi

          if [[ "$(git cat-file -t "refs/tags/${tag}")" != "tag" ]]; then
            echo "Release tag ${tag} must be annotated" >&2
            exit 1
          fi

          release_commit="$(git rev-list -n 1 "${tag}")"
          subject="$(git log -1 --format=%s "${release_commit}")"
          if [[ "${subject}" != "chore(release): ${tag}" ]]; then
            echo "Unexpected release commit subject: ${subject}" >&2
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${release_commit}" origin/main; then
            echo "Release commit is not reachable from origin/main" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release JAR
        run: ./gradlew build

      - name: Prepare release notes
        run: ./gradlew releaseNotes -PreleaseVersion="${{ steps.release.outputs.version }}"

      - name: Verify release asset
        shell: bash
        run: |
          set -euo pipefail
          asset="build/libs/spellroot-${{ steps.release.outputs.version }}.jar"
          if [[ ! -f "${asset}" ]]; then
            echo "Expected release asset was not built: ${asset}" >&2
            find build/libs -maxdepth 1 -type f -print >&2
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "build/libs/spellroot-${{ steps.release.outputs.version }}.jar"
          --verify-tag
          --title "Spellroot ${{ steps.release.outputs.version }}"
          --notes-file build/release-notes.md
